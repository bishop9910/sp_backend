externalDocs:
  description: OpenAPI
  url: https://swagger.io/resources/open-api/
host: localhost:8080
info:
  contact:
    email: bishop9910@163.com
    name: API Support
  description: 社区平台 API 文档，包含用户、帖子、委托等功能
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: sp_backend API
  version: 1.3.6
paths:
  /app/auth/login:
    post:
      consumes:
      - application/json
      description: 使用用户名和密码获取访问令牌
      parameters:
      - description: 登录信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: 用户登录
      tags:
      - 认证
  /app/auth/refresh:
    post:
      consumes:
      - application/json
      description: 刷新过时token
      parameters:
      - description: 刷新信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.RefreshRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handlers.RefreshResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: 用户token刷新
      tags:
      - 认证
  /app/auth/register:
    post:
      consumes:
      - application/json
      description: 创建新用户账号
      parameters:
      - description: 注册信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handlers.RegisterResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: 用户注册
      tags:
      - 认证
  /app/entrust/{entrust_id}:
    get:
      consumes:
      - application/json
      description: 给ID拿委托
      parameters:
      - description: 委托ID
        format: int64
        in: path
        name: entrust_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.GetEntrustByIDResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: 获取委托
      tags:
      - 委托
  /app/entrust/accept:
    post:
      consumes:
      - application/json
      description: 接受委托,is_progressing就会变成true(进行中),返回生成的二维码数据库内容
      parameters:
      - description: 接受委托请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.AcceptEntrustRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.AcceptEntrustResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            type: boject
      summary: 接受委托
      tags:
      - 委托
  /app/entrust/comment:
    get:
      consumes:
      - application/json
      description: 分页获取指定委托的评论列表，按创建时间倒序
      parameters:
      - description: 委托ID
        format: int64
        in: query
        name: entrust_id
        required: true
        type: integer
      - default: 1
        description: 页码
        format: int32
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页数量
        format: int32
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.GetEntrustCommentsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: 获取评论列表
      tags:
      - 委托
    post:
      consumes:
      - application/json
      description: 为指定委托创建一条新评论，需要用户登录认证
      parameters:
      - description: 评论创建请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateEntrustCommentRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
