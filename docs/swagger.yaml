basePath: /app
definitions:
  enums.Gender:
    enum:
    - 0
    - 1
    - 2
    type: integer
    x-enum-comments:
      GenderFemale: "2"
      GenderMale: "1"
      GenderUnknown: "0"
    x-enum-descriptions:
    - "0"
    - "1"
    - "2"
    x-enum-varnames:
    - GenderUnknown
    - GenderMale
    - GenderFemale
  handlers.AvatarData:
    properties:
      url:
        example: /avatars/xxxx.png
        type: string
    type: object
  handlers.EditRequest:
    properties:
      key:
        type: string
      value: {}
    type: object
  handlers.EditResponse:
    properties:
      message:
        type: string
      success:
        example: true
        type: boolean
    type: object
  handlers.ErrorResponse:
    properties:
      error:
        example: invalid request
        type: string
    type: object
  handlers.GetInfoResponse:
    properties:
      data:
        $ref: '#/definitions/handlers.GetInfoResponseData'
      message:
        type: string
      success:
        example: true
        type: boolean
    type: object
  handlers.GetInfoResponseData:
    properties:
      avatar:
        type: string
      birth:
        type: string
      credit_coin:
        type: integer
      credit_score:
        type: integer
      email:
        type: string
      gender:
        $ref: '#/definitions/enums.Gender'
      nickname:
        type: string
      signature:
        type: string
      username:
        type: string
    type: object
  handlers.LoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  handlers.LoginResponse:
    properties:
      data:
        $ref: '#/definitions/handlers.LoginResponseData'
      message:
        example: ok
        type: string
      success:
        example: true
        type: boolean
    type: object
  handlers.LoginResponseData:
    properties:
      access_token:
        type: string
      expires_in:
        description: (多少秒token过期)
        type: integer
      refresh_token:
        type: string
    type: object
  handlers.RefreshRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  handlers.RefreshResponse:
    properties:
      data:
        $ref: '#/definitions/handlers.RefreshResponseData'
      message:
        example: ok
        type: string
      success:
        example: true
        type: boolean
    type: object
  handlers.RefreshResponseData:
    properties:
      access_token:
        type: string
      expires_in:
        type: integer
    type: object
  handlers.RegisterRequest:
    properties:
      email:
        type: string
      password:
        minLength: 6
        type: string
      username:
        maxLength: 20
        minLength: 3
        type: string
    required:
    - email
    - password
    - username
    type: object
  handlers.RegisterResponse:
    properties:
      data:
        $ref: '#/definitions/handlers.RegisterResponseData'
      message:
        example: ok
        type: string
      success:
        example: true
        type: boolean
    type: object
  handlers.RegisterResponseData:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
      user_id:
        type: integer
    type: object
  handlers.UploadAvatarRequest:
    description: 头像上传请求参数
    properties:
      user_id:
        description: |-
          用户ID
          @required
        example: 1
        type: integer
    type: object
  handlers.UploadAvatarResponse:
    description: 头像上传响应
    properties:
      data:
        $ref: '#/definitions/handlers.AvatarData'
      message:
        example: 头像上传成功
        type: string
      success:
        example: true
        type: boolean
    type: object
externalDocs:
  description: OpenAPI
  url: https://swagger.io/resources/open-api/
host: localhost:8080
info:
  contact:
    email: bishop9910@163.com
    name: API Support
  description: 社区平台 API 文档，包含用户、帖子、委托等功能
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: sp_backend API
  version: "1.2"
paths:
  /app/auth/login:
    post:
      consumes:
      - application/json
      description: 使用用户名和密码获取访问令牌
      parameters:
      - description: 登录信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: 用户登录
      tags:
      - 认证
  /app/auth/refresh:
    post:
      consumes:
      - application/json
      description: 刷新过时token
      parameters:
      - description: 刷新信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.RefreshRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handlers.RefreshResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: 用户token刷新
      tags:
      - 认证
  /app/auth/register:
    post:
      consumes:
      - application/json
      description: 创建新用户账号
      parameters:
      - description: 注册信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handlers.RegisterResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: 用户注册
      tags:
      - 认证
  /app/avatar/{filename}:
    get:
      description: 通过文件名访问头像图片，禁止路径遍历和目录列表
      parameters:
      - description: 头像文件名
        in: path
        name: filename
        required: true
        type: string
      produces:
      - image/png
      - image/jpeg
      - image/gif
      - image/webp
      responses:
        "200":
          description: OK
          schema:
            type: file
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: 获取用户头像
      tags:
      - 头像
  /app/uploads/avatar:
    post:
      consumes:
      - multipart/form-data
      description: 上传用户头像
      parameters:
      - description: 上传用户头像表单
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.UploadAvatarRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.UploadAvatarResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: 上传用户头像
      tags:
      - 头像
  /app/user/edit:
    post:
      consumes:
      - application/json
      description: 只能修改邮箱，昵称，性别(2女,1男,0未知)，生日，签名
      parameters:
      - description: 修改用户数值信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.EditRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.EditResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: 修改用户自己的信息
      tags:
      - 用户
  /app/user/get-info:
    get:
      consumes:
      - application/json
      description: 用于获取用户信息
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.GetInfoResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: 获取用户信息
      tags:
      - 用户
schemes:
- http
- https
securityDefinitions:
  BearerAuth:
    description: 请输入 "Bearer <token>"，例如：Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
